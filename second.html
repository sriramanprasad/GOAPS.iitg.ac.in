<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GATE 2026 - Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
    .topbar {
      background: #6a1b9a;
      color: white;
      padding: 15px 30px;
      font-size: 1.3rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .welcome {
      font-size: 1.5rem;
      margin-bottom: 25px;
      color: #6a1b9a;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      padding: 25px;
      margin-bottom: 30px;
    }
    .card h2 {
      margin: 0 0 20px 0;
      color: #6a1b9a;
      border-bottom: 2px solid #6a1b9a;
      padding-bottom: 10px;
    }
    .status-row {
      display: flex;
      margin-bottom: 15px;
      font-size: 1.1rem;
    }
    .status-label {
      font-weight: bold;
      width: 220px;
      color: #444;
    }
    .status-value {
      flex: 1;
    }
    .highlight {
      color: #d32f2f;
      font-weight: bold;
    }
    .btn {
      background: #6a1b9a;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      margin-right: 15px;
      margin-top: 15px;
    }
    .btn:hover {
      background: #4a148c;
    }
  </style>
</head>
<body>

  <div class="topbar">
    Welcome, S SRI RAMAN PRASAD
  </div>

  <div class="container">
    <h1 class="welcome">Welcome, S SRI RAMAN PRASAD</h1>

    <div class="card">
      <h2>Application Status</h2>

      <div class="status-row">
        <div class="status-label">Enrolment Id</div>
        <div class="status-value highlight">*G146R17</div>
      </div>

      <div class="status-row">
        <div class="status-label">Applicant Name</div>
        <div class="status-value">S SRI RAMAN PRASAD</div>
      </div>

      <div class="status-row">
        <div class="status-label">Applicant Status</div>
        <div class="status-value">Your GATE 2026 results are available for viewing</div>
      </div>

      <button class="btn">VIEW RESULT (DA)</button>
      <button class="btn">VIEW RESPONSES (DA)</button>
    </div>

    <div class="card">
      <h2>Application Form and Admit Card Download</h2>
      <p>(Content goes here — collapsed by default in original)</p>
    </div>
  </div>

</body>
</html>
